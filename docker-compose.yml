# CPU services only. Point VLLM_BASE_URL at an external GPU host running vLLM.
services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.example
    environment:
      - ENABLE_TELEMETRY=false
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install -q streamlit requests &&
      streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
